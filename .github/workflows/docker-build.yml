name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'packages/postgis-vector-timescaledb/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Dockerfile
        id: version
        run: |
          VERSION=$(grep -oP 'org\.opencontainers\.image\.version="\K[^"]+' packages/postgis-vector-timescaledb/Dockerfile)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/postgis-vector-timescaledb
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/b3nab/postgis-vector-timescaledb:${{ steps.version.outputs.version }}
            ghcr.io/b3nab/postgis-vector-timescaledb:latest
